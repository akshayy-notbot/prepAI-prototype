services:
  # 1. The FastAPI Web Server
  - type: web
    name: prepai-api
    env: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: psql 
          name: prepai-db
      - key: REDIS_URL
        fromService:
          type: redis
          name: prepai-redis
      - key: GOOGLE_API_KEY
        sync: false

  # 2. The Celery Background Worker
  - type: worker
    name: prepai-worker
    env: python
    buildCommand: "./build.sh"
    startCommand: "celery -A tasks worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: psql 
          name: prepai-db
      - key: REDIS_URL
        fromService:
          type: redis
          name: prepai-redis
      - key: GOOGLE_API_KEY
        sync: false

  # 3. The PostgreSQL Database
  - type: psql 
    name: prepai-db
    plan: free

  # 4. The Redis Instance
  - type: redis
    name: prepai-redis
    plan: free
